<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">LeChoixDeClara.fr | L'arme secrète pour ses cadeaux</title>
    
    <meta name="description" id="meta-desc" content="Clara, 32 ans, 1m78. Silhouette athlétique au service des hommes. Je teste tout ce qu'elle rêve de recevoir pour que tu ne puisses plus te rater.">
    <meta property="og:title" content="LeChoixDeClara.fr - Experte en cadeaux femme">
    <meta property="og:description" content="Découvrez les tests sans concession de Clara pour choisir le cadeau parfait.">
    <meta property="og:image" content="clara-hero.jpg">
    <meta property="og:type" content="website">

    <!-- JSON-LD de base -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Le Choix de Clara",
      "url": "https://lechoixdeclara.fr/",
      "description": "Tests et avis sur les cadeaux pour femmes par Clara."
    }
    </script>

    <!-- 1. CHARGEMENT DES OUTILS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel pour traduire le JSX en direct -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.263.1"></script>
    
    <!-- Éditeur Quill -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <!-- 2. FIREBASE (Version Compat - La plus robuste pour HTML unique) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #FDF5E6; color: #1A1A1A; margin: 0; }
        .font-serif { font-family: 'Merriweather', serif; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bg-emerald { background-color: #004D40; }
        .text-emerald { color: #004D40; }
        .bg-bordeaux { background-color: #6B0D0D; }
        .text-bordeaux { color: #6B0D0D; }
        
        /* Styles pour l'éditeur et le contenu */
        .ql-container { font-family: 'DM Sans', sans-serif; font-size: 16px; border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem; background: white; }
        .ql-toolbar { border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem; background: #f9fafb; }
        .ql-editor { min-height: 400px; }
        
        .html-content h1, .html-content h2 { font-family: 'Merriweather', serif; color: #004D40; margin-top: 2rem; margin-bottom: 1rem; font-weight: bold; font-size: 1.5rem; }
        .html-content p { margin-bottom: 1rem; line-height: 1.7; }
        .html-content img { width: 100%; border-radius: 1rem; margin: 2rem 0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .html-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Récupération des globales (Pas d'import)
        const { useState, useEffect, useRef } = window.React;

        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBsir6uo65xG4IsfQgHhvbBuEC_srM8Ozo",
            authDomain: "le-choix-de-clara.firebaseapp.com",
            projectId: "le-choix-de-clara",
            storageBucket: "le-choix-de-clara.firebasestorage.app",
            messagingSenderId: "573771946630",
            appId: "1:573771946630:web:8c24d0a0a5c2f706de8f07"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const CLARA_APP_ID = 'le-choix-de-clara';
        
        // TON ID ADMINISTRATEUR
        const ADMIN_UID = "UN8togQLU6Xl2yNcU3ses2rHDjt2"; 

        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons && window.lucide.icons[name]) {
                    setIconSvg(window.lucide.icons[name].toSvg({ size, class: className }));
                }
            }, [name, size, className]);
            return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };

        const ArticleLayout = ({ article, onBack }) => {
            useEffect(() => {
                const oldTitle = document.title;
                document.title = `${article.title} | Avis de Clara`;
                return () => { document.title = oldTitle; };
            }, [article]);

            return (
                <article className="max-w-4xl mx-auto px-6 py-12 text-left fade-in">
                    <button onClick={onBack} className="text-[#004D40] font-bold mb-10 flex items-center gap-2 hover:text-[#6B0D0D] transition uppercase text-xs tracking-widest">
                        <Icon name="ArrowLeft" size={16} /> Retour aux tests
                    </button>
                    <header>
                        <span className="text-[#6B0D0D] font-bold uppercase tracking-widest text-[10px] mb-4 block">{article.category}</span>
                        <h1 className="text-4xl md:text-6xl font-serif mb-8 text-[#004D40] leading-tight text-left">{article.title}</h1>
                        <p className="text-xl italic border-l-4 border-[#6B0D0D] pl-6 mb-12 bg-white py-8 rounded-r-2xl shadow-sm text-left text-gray-700">"{article.excerpt}"</p>
                    </header>
                    {article.imageUrl && <img src={article.imageUrl} alt={article.imageAlt || article.title} className="w-full rounded-3xl mb-12 shadow-2xl border-8 border-white" />}
                    <div className="html-content text-lg text-left whitespace-pre-wrap leading-relaxed text-gray-700" dangerouslySetInnerHTML={{ __html: article.content || "" }}></div>
                    <footer className="bg-white p-12 rounded-3xl shadow-xl text-center border border-gray-50 my-20">
                        <p className="mb-6 font-bold text-gray-400 uppercase tracking-widest text-[10px] tracking-tighter">Sélection officielle Clara • Partenaire Amazon</p>
                        <a href={article.affiliateLink} target="_blank" className="bg-[#6B0D0D] text-white px-12 py-6 rounded-2xl font-bold inline-block shadow-2xl btn-hover hover:scale-105 transition text-lg tracking-wide">Vérifier le prix sur Amazon</a>
                    </footer>
                </article>
            );
        };

        function App() {
            const [view, setView] = useState('home'); 
            const [articles, setArticles] = useState([]);
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [deletingId, setDeletingId] = useState(null);
            
            // États Admin & Éditeur
            const [isPreview, setIsPreview] = useState(false);
            const [previewData, setPreviewData] = useState({});
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [authError, setAuthError] = useState("");
            
            const quillRef = useRef(null);
            const quillInstance = useRef(null);
            const formRef = useRef(null);

            // 1. Auth
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                    if (!u) auth.signInAnonymously().catch(e => console.error("Auth Anon error", e));
                });
                return () => unsubscribe();
            }, []);

            // 2. Data
            useEffect(() => {
                if (!user) return;
                const unsubscribe = db.collection('artifacts').doc(CLARA_APP_ID).collection('public').doc('data').collection('articles')
                    .onSnapshot((snapshot) => {
                        const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setArticles(docs.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                    });
                return () => unsubscribe();
            }, [user]);

            // 3. Quill Init
            useEffect(() => {
                if (view === 'admin' && !isPreview && quillRef.current) {
                    quillInstance.current = new Quill(quillRef.current, {
                        theme: 'snow', placeholder: 'Racontez votre expérience...',
                        modules: { toolbar: { container: [[{ 'header': [1, 2, false] }], ['bold', 'italic', 'underline', 'blockquote'], [{ 'list': 'ordered' }, { 'list': 'bullet' }], ['link', 'image', 'clean']],
                            handlers: { image: () => { const url = prompt("URL de l'image (ex: legging.webp) :"); if (url) { const range = quillInstance.current.getSelection(); quillInstance.current.insertEmbed(range.index, 'image', url); } } } } }
                    });
                    if (previewData.content) quillInstance.current.root.innerHTML = previewData.content;
                }
                return () => { quillInstance.current = null; };
            }, [view, isPreview]);

            const handleAdminTrigger = (e) => {
                e.stopPropagation();
                window.scrollTo(0, 0);
                if (user && user.uid === ADMIN_UID) setView('admin');
                else setShowLoginModal(true);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                auth.signInWithEmailAndPassword(email, password)
                    .then(() => { setShowLoginModal(false); setView('admin'); })
                    .catch(() => setAuthError("Identifiants incorrects."));
            };

            const handleTogglePreview = () => {
                if (!isPreview) {
                    const fd = new FormData(formRef.current);
                    setPreviewData({
                        title: fd.get('title'),
                        category: fd.get('category'),
                        excerpt: fd.get('excerpt'),
                        content: quillInstance.current.root.innerHTML,
                        imageUrl: fd.get('imageUrl'),
                        imageAlt: fd.get('imageAlt'),
                        affiliateLink: fd.get('affiliateLink')
                    });
                    setIsPreview(true);
                    window.scrollTo(0, 0);
                } else {
                    setIsPreview(false);
                }
            };

            const handleAddArticle = (e) => {
                e.preventDefault();
                const data = isPreview ? { ...previewData, createdAt: Date.now() } : {
                    title: e.target.title.value,
                    category: e.target.category.value,
                    excerpt: e.target.excerpt.value,
                    content: quillInstance.current.root.innerHTML,
                    imageUrl: e.target.imageUrl.value,
                    imageAlt: e.target.imageAlt.value,
                    affiliateLink: e.target.affiliateLink.value,
                    createdAt: Date.now()
                };
                db.collection('artifacts').doc(CLARA_APP_ID).collection('public').doc('data').collection('articles').add(data)
                    .then(() => { setPreviewData({}); setIsPreview(false); setView('home'); window.scrollTo(0,0); });
            };

            const confirmDelete = () => {
                if (!deletingId) return;
                db.collection('artifacts').doc(CLARA_APP_ID).collection('public').doc('data').collection('articles').doc(deletingId).delete()
                    .then(() => setDeletingId(null));
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#FDF5E6] font-serif italic text-[#004D40]">Chargement...</div>;

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="text-2xl font-serif font-bold text-[#004D40] cursor-pointer" onClick={() => {setView('home'); setIsPreview(false); window.scrollTo(0,0);}}>LeChoixDe<span className="text-[#6B0D0D]">Clara</span>.fr</div>
                        <div className="flex items-center gap-6">
                            <button onClick={() => {setView('home'); setIsPreview(false); window.scrollTo(0,0);}} className="hidden md:block text-[10px] uppercase font-bold tracking-widest hover:text-[#6B0D0D]">Accueil</button>
                            {user && user.uid === ADMIN_UID && view !== 'admin' && <button onClick={() => setView('admin')} className="bg-[#004D40] text-white px-4 py-2 rounded-full text-[10px] font-bold flex items-center gap-2 btn-hover"><Icon name="Settings" size={14} /> Dashboard</button>}
                        </div>
                    </nav>

                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6 backdrop-blur-sm fade-in">
                            <div className="bg-white p-10 rounded-3xl max-w-md w-full shadow-2xl relative">
                                <button onClick={() => setShowLoginModal(false)} className="absolute top-6 right-6 text-gray-400 hover:text-black text-2xl font-bold">&times;</button>
                                <div className="text-center mb-8"><Icon name="Lock" size={40} className="text-[#6B0D0D] mb-4" /><h2 className="text-2xl font-serif text-[#004D40]">Admin</h2></div>
                                <form onSubmit={handleLogin} data-netlify="false" className="space-y-4">
                                    <input value={email} onChange={e => setEmail(e.target.value)} type="email" placeholder="Email" className="w-full p-4 border rounded-xl" required />
                                    <input value={password} onChange={e => setPassword(e.target.value)} type="password" placeholder="Pass" className="w-full p-4 border rounded-xl" required />
                                    {authError && <p className="text-red-500 text-xs font-bold text-center">{authError}</p>}
                                    <button className="w-full bg-[#004D40] text-white py-4 rounded-xl font-bold uppercase btn-hover">Connexion</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {deletingId && (
                        <div className="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 backdrop-blur-md fade-in">
                            <div className="bg-white p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl">
                                <Icon name="AlertTriangle" size={48} className="text-red-500 mx-auto mb-4" /><h3 className="text-xl font-bold mb-2 text-[#004D40]">Supprimer ?</h3>
                                <div className="flex gap-3 mt-6"><button onClick={() => setDeletingId(null)} className="flex-1 py-3 bg-gray-100 rounded-xl font-bold">Non</button><button onClick={confirmDelete} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold">Oui</button></div>
                            </div>
                        </div>
                    )}

                    <main className="flex-grow">
                        {view === 'home' && (
                            <div className="fade-in">
                                <section className="bg-white py-16 md:py-24 px-6 text-left border-b border-gray-50">
                                    <div className="container mx-auto grid md:grid-cols-2 gap-16 items-center">
                                        <div>
                                            <span className="bg-[#004D40] text-white px-4 py-1 rounded-full text-[10px] font-bold mb-6 inline-block uppercase tracking-widest">32 ANS | 1M78 | EXPERTE CADEAUX</span>
                                            <h1 className="text-5xl md:text-7xl font-serif leading-tight mb-8 text-[#004D40]">L'arme secrète pour <span className="text-[#6B0D0D] italic">ses</span> cadeaux.</h1>
                                            <p className="text-lg text-gray-600 mb-10 italic border-l-4 border-[#6B0D0D] pl-6 leading-relaxed">"Moi c'est Clara. Rousse et passionnée. Je teste ce qu'elle veut vraiment recevoir pour que tu ne puisses plus te rater."</p>
                                            <button onClick={() => document.getElementById('latest').scrollIntoView({behavior:'smooth'})} className="bg-[#6B0D0D] text-white px-10 py-5 rounded-xl font-bold shadow-xl btn-hover transition">Découvrir mes sélections</button>
                                        </div>
                                        <div className="aspect-[4/5] bg-gray-50 rounded-3xl flex items-center justify-center border-8 border-white shadow-2xl overflow-hidden relative">
                                            <img src="clara-hero.jpg" alt="Portrait de Clara" className="w-full h-full object-cover" />
                                        </div>
                                    </div>
                                </section>
                                <section id="latest" className="py-20 container mx-auto px-6 text-left">
                                    <h2 className="text-4xl font-serif text-[#004D40] mb-16">Derniers tests de Clara</h2>
                                    <div className="grid md:grid-cols-3 gap-10">
                                        {articles.map(article => (
                                            <div key={article.id} onClick={() => { setSelectedArticle(article); setView('article'); window.scrollTo(0,0); }} className="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition group cursor-pointer border border-gray-100 btn-hover">
                                                <div className="h-64 bg-gray-100 relative overflow-hidden">
                                                    <span className="absolute top-4 left-4 bg-emerald text-white text-[10px] px-3 py-1 rounded font-bold z-10 uppercase tracking-widest shadow-sm">{article.category}</span>
                                                    {article.imageUrl && <img src={article.imageUrl} alt={article.imageAlt || article.title} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" />}
                                                </div>
                                                <div className="p-8 text-left">
                                                    <h3 className="font-serif text-xl mb-4 leading-tight group-hover:text-[#6B0D0D] transition">{art.title}</h3>
                                                    <p className="text-gray-500 text-sm line-clamp-2 mb-6 italic">{art.excerpt}</p>
                                                    <div className="flex justify-between items-center text-[#004D40] font-bold text-[10px] uppercase tracking-tighter"><span>Lire le test complet</span><Icon name="ChevronRight" size={16} /></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'article' && selectedArticle && <ArticleLayout article={selectedArticle} onBack={() => {setView('home'); window.scrollTo(0,0);}} />}

                        {view === 'admin' && user && user.uid === ADMIN_UID && (
                            <div className="max-w-6xl mx-auto px-6 py-12 text-left fade-in">
                                <div className="flex justify-between items-center mb-12 border-b pb-8"><h2 className="text-3xl font-serif text-[#004D40] font-bold">Atelier de Rédaction</h2><button onClick={() => { auth.signOut(); setView('home'); }} className="text-gray-400 hover:text-[#6B0D0D] flex items-center gap-2 font-bold transition"><Icon name="LogOut" size={18}/> Quitter</button></div>
                                
                                {isPreview ? (
                                    <div className="space-y-8">
                                        <div className="flex justify-between items-center bg-emerald text-white p-6 rounded-2xl shadow-lg sticky top-24 z-[60]">
                                            <div><p className="font-bold">Mode Prévisualisation</p></div>
                                            <div className="flex gap-4"><button onClick={handleTogglePreview} className="bg-white/10 px-6 py-3 rounded-xl font-bold transition">Modifier</button><button onClick={handleAddArticle} className="bg-white text-emerald px-8 py-3 rounded-xl font-bold shadow-xl transition">Publier maintenant</button></div>
                                        </div>
                                        <div className="bg-white rounded-[3rem] shadow-sm border overflow-hidden mb-10"><ArticleLayout article={previewData} onBack={handleTogglePreview} /></div>
                                    </div>
                                ) : (
                                    <div className="grid lg:grid-cols-2 gap-12 items-start text-left">
                                        <div className="bg-white p-8 rounded-3xl shadow-lg border border-gray-100">
                                            <h3 className="font-bold mb-8 flex items-center gap-2 text-xl text-[#004D40]"><Icon name="Plus" /> Nouveau Test</h3>
                                            <form ref={formRef} onSubmit={handleAddArticle} data-netlify="false" className="space-y-6 text-left">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <input name="title" defaultValue={previewData.title || ''} placeholder="Nom produit" className="p-4 border rounded-xl outline-none" required />
                                                    <select name="category" defaultValue={previewData.category || 'ACTIVEWEAR'} className="p-4 border rounded-xl outline-none bg-gray-50"><option>ACTIVEWEAR</option><option>LOUNGEWEAR</option><option>BEACHWEAR</option><option>GEEK</option><option>TECH</option></select>
                                                </div>
                                                <input name="excerpt" defaultValue={previewData.excerpt || ''} placeholder="Accroche SEO" className="w-full p-4 border rounded-xl outline-none" required />
                                                <div className="space-y-2 text-left"><label className="text-[10px] font-bold uppercase text-gray-400">Contenu</label><div ref={quillRef} style={{height: '450px'}}></div></div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <input name="imageUrl" defaultValue={previewData.imageUrl || ''} placeholder="URL image" className="p-4 border rounded-xl outline-none bg-gray-50" required />
                                                    <input name="imageAlt" defaultValue={previewData.imageAlt || ''} placeholder="ALT SEO" className="p-4 border rounded-xl outline-none bg-gray-50" />
                                                </div>
                                                <input name="affiliateLink" defaultValue={previewData.affiliateLink || ''} placeholder="Lien Amazon" className="w-full p-4 border rounded-xl outline-none" required />
                                                <div className="grid grid-cols-2 gap-4 pt-4"><button type="button" onClick={handleTogglePreview} className="bg-emerald text-white py-5 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 transition"><Icon name="Eye" /> Prévisualiser</button><button className="bg-[#6B0D0D] text-white py-5 rounded-2xl font-bold shadow-lg transition">Publier</button></div>
                                            </form>
                                        </div>
                                        <div className="space-y-4">
                                            <h3 className="font-bold mb-8 text-[#004D40]">Articles en ligne ({articles.length})</h3>
                                            <div className="grid gap-4 max-h-[1100px] overflow-y-auto no-scrollbar text-left">{articles.map(art => (<div key={art.id} className="bg-white p-6 rounded-2xl flex justify-between items-center border border-gray-100 shadow-sm"><div className="text-left overflow-hidden mr-4"><p className="font-bold text-sm truncate text-[#004D40]">{art.title}</p><p className="text-[10px] text-[#6B0D0D] font-bold uppercase mt-1">{art.category}</p></div><button onClick={() => setDeletingId(art.id)} className="text-gray-200 hover:text-red-500 p-3 transition-colors bg-gray-50 rounded-xl"><Icon name="Trash2" size={18} /></button></div>))}</div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="bg-[#1A1A1A] text-white py-20 px-6 border-t border-white/5 text-left mt-auto">
                        <div className="container mx-auto grid md:grid-cols-3 gap-16 text-left">
                            <div className="text-left"><div className="text-3xl font-serif font-bold mb-8 cursor-default select-none text-white">LeCh<span onClick={handleAdminTrigger} className="cursor-default hover:text-[#6B0D0D] transition-colors duration-200">o</span>ixDeClara</div><p className="text-gray-400 text-sm italic leading-relaxed max-w-xs">Clara, 32 ans, 1m78. Une expertise athlétique au service des hommes.</p></div>
                            <div className="text-gray-500 text-[10px] space-y-4 uppercase tracking-widest font-bold text-left"><div onClick={() => window.scrollTo(0,0)} className="hover:text-white transition cursor-pointer">Mentions Légales</div><div onClick={() => window.scrollTo(0,0)} className="hover:text-white transition cursor-pointer">Confidentialité</div><div onClick={() => window.scrollTo(0,0)} className="hover:text-white transition cursor-pointer">Affiliation</div></div>
                            <div className="text-gray-400 text-sm text-left"><p className="font-bold text-white mb-4 uppercase tracking-widest text-xs">Contact</p><p className="italic text-gray-500 mb-8">nova.iris.kael@gmail.com</p></div>
                        </div>
                        <div className="container mx-auto mt-20 pt-8 border-t border-white/5 text-[10px] text-gray-700 font-mono text-center">© 2026 LECHOIXDECLARA.FR</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
