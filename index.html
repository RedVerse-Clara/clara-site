<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeChoixDeClara.fr | L'arme secrète pour ses cadeaux</title>
    
    <!-- META TAGS POUR GOOGLE & PARTAGE -->
    <meta name="description" content="Clara, 32 ans, 1m78. Silhouette athlétique au service des hommes. Je teste tout ce qu'elle rêve de recevoir pour que tu ne puisses plus te rater.">
    <meta property="og:title" content="LeChoixDeClara.fr - Experte en cadeaux femme">
    <meta property="og:description" content="Découvrez les tests sans concession de Clara pour choisir le cadeau parfait.">
    <meta property="og:image" content="clara-experte-avis-activewear-lechoixdeclara.webp">
    <meta property="og:type" content="website">

    <!-- Scripts Bibliothèques -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.263.1"></script>
    
    <!-- Éditeur HTML Quill -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #FDF5E6; color: #1A1A1A; margin: 0; }
        .font-serif { font-family: 'Merriweather', serif; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-emerald { background-color: #004D40; }
        .text-emerald { color: #004D40; }
        .bg-bordeaux { background-color: #6B0D0D; }
        .text-bordeaux { color: #6B0D0D; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        /* Contenu Article HTML */
        .html-content h1, .html-content h2, .html-content h3 { font-family: 'Merriweather', serif; color: #004D40; margin-top: 2.5rem; margin-bottom: 1.2rem; font-weight: bold; }
        .html-content h2 { font-size: 1.75rem; border-left: 4px solid #6B0D0D; padding-left: 1rem; }
        .html-content p { margin-bottom: 1.5rem; line-height: 1.8; color: #374151; font-size: 1.125rem; }
        .html-content strong { color: #111827; font-weight: 700; }
        .html-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        .html-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        .html-content li { margin-bottom: 0.5rem; }
        .html-content blockquote { border-left: 4px solid #6B0D0D; padding-left: 1.5rem; font-style: italic; color: #4B5563; margin: 2.5rem 0; font-size: 1.25rem; }
        .html-content img { width: 100%; border-radius: 1.5rem; margin: 2rem 0; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 8px solid white; }

        /* Custom Quill */
        .ql-container { font-family: 'DM Sans', sans-serif; font-size: 16px; border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem; background: white; }
        .ql-toolbar { border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem; background: #f9fafb; }
        .ql-editor { min-height: 400px; }
        
        .legal-content h2 { font-family: 'Merriweather', serif; color: #004D40; font-size: 1.5rem; margin-top: 2rem; margin-bottom: 1rem; font-weight: bold; }
        .legal-content p { margin-bottom: 1rem; line-height: 1.7; color: #4B5563; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = window.React;

        const firebaseConfig = {
            apiKey: "AIzaSyBsir6uo65xG4IsfQgHhvbBuEC_srM8Ozo",
            authDomain: "le-choix-de-clara.firebaseapp.com",
            projectId: "le-choix-de-clara",
            storageBucket: "le-choix-de-clara.firebasestorage.app",
            messagingSenderId: "573771946630",
            appId: "1:573771946630:web:8c24d0a0a5c2f706de8f07"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const CLARA_APP_ID = 'le-choix-de-clara';
        const ADMIN_UID = "UN8togQLU6Xl2yNcU3ses2rHDjt2"; 

        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            useEffect(() => {
                if (window.lucide && window.lucide.icons && window.lucide.icons[name]) {
                    setIconSvg(window.lucide.icons[name].toSvg({ size, class: className }));
                }
            }, [name, size, className]);
            if (!iconSvg) return <span className="inline-block" style={{width: size, height: size}}></span>;
            return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };

        const ArticleLayout = ({ article, onBack }) => (
            <div className="max-w-4xl mx-auto px-6 py-12 text-left fade-in">
                <button onClick={onBack} className="text-[#004D40] font-bold mb-10 flex items-center gap-2 hover:text-[#6B0D0D] transition">
                    <Icon name="ChevronLeft" size={20} /> Retour
                </button>
                <h1 className="text-4xl md:text-6xl font-serif mb-8 text-[#004D40] leading-tight text-left">{article.title}</h1>
                <p className="text-xl italic border-l-4 border-[#6B0D0D] pl-6 mb-12 bg-white py-8 rounded-r-2xl shadow-sm text-left text-gray-700">"{article.excerpt}"</p>
                
                {article.imageUrl && (
                    <img src={article.imageUrl} className="w-full rounded-3xl mb-12 shadow-2xl border-8 border-white" alt={article.title} />
                )}

                <div 
                    className="html-content text-lg text-left" 
                    dangerouslySetInnerHTML={{ __html: article.content || "" }} 
                />

                <div className="bg-white p-12 rounded-3xl shadow-xl text-center border border-gray-50 my-20">
                    <p className="mb-6 font-bold text-gray-400 uppercase tracking-widest text-xs tracking-tighter">Approuvé par Clara • Lien Partenaire Amazon</p>
                    <a href={article.affiliateLink} target="_blank" className="bg-[#6B0D0D] text-white px-12 py-6 rounded-2xl font-bold inline-block shadow-2xl btn-hover hover:scale-105 transition text-lg tracking-wide">Vérifier le prix sur Amazon</a>
                </div>
            </div>
        );

        function App() {
            const [view, setView] = useState('home'); 
            const [articles, setArticles] = useState([]);
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [deletingId, setDeletingId] = useState(null);
            
            // États Formulaire Admin & Prévisualisation
            const [isPreview, setIsPreview] = useState(false);
            const [previewData, setPreviewData] = useState({
                title: "",
                category: "ACTIVEWEAR",
                excerpt: "",
                content: "",
                imageUrl: "",
                affiliateLink: ""
            });
            const quillRef = useRef(null);
            const quillInstance = useRef(null);
            const formRef = useRef(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                    if (!u) auth.signInAnonymously().catch(console.error);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const unsubscribe = db.collection('artifacts').doc(CLARA_APP_ID).collection('public').doc('data').collection('articles')
                    .onSnapshot((snapshot) => {
                        const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setArticles(docs.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
                    });
                return () => unsubscribe();
            }, []);

            // Initialisation et gestion de Quill (Correctif persistance)
            useEffect(() => {
                if (view === 'admin' && !isPreview && quillRef.current) {
                    // Toujours créer une nouvelle instance si l'élément DOM est présent
                    quillInstance.current = new Quill(quillRef.current, {
                        theme: 'snow',
                        placeholder: 'Racontez votre expérience produit ici...',
                        modules: {
                            toolbar: {
                                container: [
                                    [{ 'header': [1, 2, 3, false] }],
                                    ['bold', 'italic', 'underline', 'blockquote'],
                                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                                    ['link', 'image', 'clean']
                                ],
                                handlers: {
                                    image: () => {
                                        const url = prompt("Entrez l'URL de l'image :");
                                        if (url) {
                                            const range = quillInstance.current.getSelection();
                                            quillInstance.current.insertEmbed(range.index, 'image', url);
                                        }
                                    }
                                }
                            }
                        }
                    });
                    
                    // Restaurer le contenu sauvegardé
                    if (previewData.content) {
                        quillInstance.current.root.innerHTML = previewData.content;
                    }
                }

                // Cleanup important lors du démontage pour permettre la réinitialisation
                return () => {
                    quillInstance.current = null;
                };
            }, [view, isPreview]);

            const handleAdminTrigger = (e) => {
                e.stopPropagation();
                window.scrollTo(0, 0);
                if (user && user.uid === ADMIN_UID) setView('admin');
                else setShowLoginModal(true);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const email = e.target.email.value;
                const password = e.target.password.value;
                auth.signInWithEmailAndPassword(email, password)
                    .then(() => { setShowLoginModal(false); setView('admin'); })
                    .catch(() => alert("Accès refusé."));
            };

            const handleTogglePreview = () => {
                if (!isPreview) {
                    // Sauvegarder les données actuelles avant de passer en preview
                    const fd = new FormData(formRef.current);
                    setPreviewData({
                        title: fd.get('title'),
                        category: fd.get('category'),
                        excerpt: fd.get('excerpt'),
                        content: quillInstance.current.root.innerHTML,
                        imageUrl: fd.get('imageUrl'),
                        affiliateLink: fd.get('affiliateLink')
                    });
                    setIsPreview(true);
                    window.scrollTo(0, 0);
                } else {
                    setIsPreview(false);
                }
            };

            const handleAddArticle = (e) => {
                e.preventDefault();
                if (!user || user.uid !== ADMIN_UID) return;
                
                const finalData = isPreview ? { ...previewData, createdAt: Date.now() } : {
                    title: e.target.title.value,
                    category: e.target.category.value,
                    excerpt: e.target.excerpt.value,
                    content: quillInstance.current.root.innerHTML,
                    imageUrl: e.target.imageUrl.value,
                    affiliateLink: e.target.affiliateLink.value,
                    createdAt: Date.now()
                };
                
                db.collection('artifacts').doc(CLARA_APP_ID).collection('public').doc('data').collection('articles').add(finalData)
                    .then(() => { 
                        setPreviewData({ title: "", category: "ACTIVEWEAR", excerpt: "", content: "", imageUrl: "", affiliateLink: "" });
                        setIsPreview(false);
                        setView('home'); 
                        window.scrollTo(0,0); 
                    });
            };

            const confirmDelete = () => {
                db.collection('artifacts').doc(CLARA_APP_ID).collection('public').doc('data').collection('articles').doc(deletingId).delete()
                    .then(() => setDeletingId(null));
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#FDF5E6] font-serif italic text-[#004D40]">Chargement de l'univers de Clara...</div>;

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="text-2xl font-serif font-bold text-[#004D40] cursor-pointer" onClick={() => {setView('home'); setIsPreview(false); window.scrollTo(0,0);}}>
                            LeChoixDe<span className="text-[#6B0D0D]">Clara</span>.fr
                        </div>
                        <div className="flex items-center gap-6">
                            <button onClick={() => {setView('home'); setIsPreview(false); window.scrollTo(0,0);}} className="hidden md:block text-xs uppercase font-bold tracking-widest hover:text-[#6B0D0D]">Accueil</button>
                            {user && user.uid === ADMIN_UID && view !== 'admin' && (
                                <button onClick={() => setView('admin')} className="bg-[#004D40] text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2 btn-hover">
                                    <Icon name="Settings" size={14} /> Dashboard
                                </button>
                            )}
                        </div>
                    </nav>

                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6 backdrop-blur-sm fade-in">
                            <div className="bg-white p-10 rounded-3xl max-w-md w-full shadow-2xl relative">
                                <button onClick={() => setShowLoginModal(false)} className="absolute top-6 right-6 text-gray-400 hover:text-black text-2xl font-bold">&times;</button>
                                <div className="text-center mb-8 text-left">
                                    <Icon name="Lock" size={40} className="text-[#6B0D0D] mb-4" />
                                    <h2 className="text-2xl font-serif text-[#004D40]">Accès Propriétaire</h2>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input name="email" type="email" placeholder="Email Marc" className="w-full p-4 border rounded-xl" required />
                                    <input name="password" type="password" placeholder="Mot de passe" className="w-full p-4 border rounded-xl" required />
                                    <button className="w-full bg-[#004D40] text-white py-4 rounded-xl font-bold shadow-lg uppercase btn-hover">S'identifier</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {deletingId && (
                        <div className="fixed inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 backdrop-blur-md fade-in">
                            <div className="bg-white p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl">
                                <Icon name="AlertTriangle" size={48} className="text-red-500 mx-auto mb-4" />
                                <h3 className="text-xl font-bold mb-2 text-[#004D40]">Supprimer ?</h3>
                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setDeletingId(null)} className="flex-1 py-3 bg-gray-100 rounded-xl font-bold">Non</button>
                                    <button onClick={confirmDelete} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold">Oui</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-grow">
                        {view === 'home' && (
                            <div className="fade-in">
                                <section className="bg-white py-16 md:py-28 px-6 text-left border-b border-gray-50">
                                    <div className="container mx-auto grid md:grid-cols-2 gap-16 items-center">
                                        <div>
                                            <span className="bg-[#004D40] text-white px-4 py-1 rounded-full text-[10px] font-bold mb-6 inline-block uppercase tracking-widest tracking-tighter">32 ANS | 1M78 | EXPERTE CADEAUX</span>
                                            <h1 className="text-5xl md:text-7xl font-serif leading-tight mb-8 text-[#004D40]">Arrête de galérer pour <span className="text-[#6B0D0D] italic">ses</span> cadeaux.</h1>
                                            <p className="text-lg text-gray-600 mb-10 italic border-l-4 border-[#6B0D0D] pl-6 leading-relaxed text-left">"Salut, moi c'est Clara. Rousse, sportive et un peu geek. Je porte et je teste tout ce qu'elle veut vraiment pour que tu ne puisses plus te rater."</p>
                                            <button onClick={() => document.getElementById('latest').scrollIntoView({behavior:'smooth'})} className="bg-[#6B0D0D] text-white px-10 py-5 rounded-xl font-bold shadow-xl btn-hover transition">Découvrir mes sélections</button>
                                        </div>
                                        <div className="aspect-[4/5] bg-gray-50 rounded-3xl flex items-center justify-center text-gray-300 border-8 border-white shadow-2xl overflow-hidden relative">
                                            <img 
                                                src="clara-experte-avis-activewear-lechoixdeclara.webp" 
                                                alt="Portrait de Clara, experte cadeaux sur LeChoixDeClara.fr" 
                                                className="w-full h-full object-cover"
                                                onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }}
                                            />
                                            <span className="hidden p-12 text-center text-sm italic font-light">Image de Clara</span>
                                        </div>
                                    </div>
                                </section>
                                <section id="latest" className="py-24 px-6 container mx-auto text-left">
                                    <h2 className="text-4xl font-serif mb-16 text-[#004D40]">Derniers tests de Clara</h2>
                                    <div className="grid md:grid-cols-3 gap-10">
                                        {articles.length > 0 ? articles.map(art => (
                                            <div key={art.id} onClick={() => { setSelectedArticle(art); setView('article'); window.scrollTo(0,0); }} className="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 cursor-pointer group border border-gray-100 btn-hover">
                                                <div className="h-64 bg-gray-100 relative overflow-hidden text-left">
                                                    <span className="absolute top-4 left-4 bg-emerald text-white text-[10px] px-3 py-1 rounded font-bold z-10 uppercase tracking-widest shadow-sm">{art.category}</span>
                                                    {art.imageUrl && <img src={art.imageUrl} className="w-full h-full object-cover group-hover:scale-105 transition duration-700" alt={art.title} />}
                                                </div>
                                                <div className="p-8 text-left">
                                                    <h3 className="font-serif text-xl mb-4 leading-tight group-hover:text-[#6B0D0D] transition">{art.title}</h3>
                                                    <p className="text-gray-500 text-sm line-clamp-2 mb-6 italic">{art.excerpt}</p>
                                                    <div className="flex justify-between items-center text-[#004D40] font-bold text-xs uppercase tracking-tighter">
                                                        <span>Lire le test complet</span>
                                                        <Icon name="ChevronRight" size={16} />
                                                    </div>
                                                </div>
                                            </div>
                                        )) : (
                                            <div className="col-span-3 py-20 text-center text-gray-400 italic bg-white/50 rounded-3xl border-2 border-dashed border-gray-200">
                                                Clara prépare ses prochains tests...
                                            </div>
                                        )}
                                    </div>
                                </section>
                            </div>
                        )}

                        {view === 'article' && selectedArticle && (
                            <ArticleLayout article={selectedArticle} onBack={() => {setView('home'); window.scrollTo(0,0);}} />
                        )}

                        {(view === 'legal' || view === 'privacy' || view === 'affiliate') && (
                            <div className="max-w-4xl mx-auto px-6 py-20 text-left fade-in legal-content">
                                <button onClick={() => {setView('home'); window.scrollTo(0,0);}} className="text-[#004D40] font-bold mb-10 flex items-center gap-2 hover:text-[#6B0D0D] transition uppercase text-xs tracking-widest">
                                    <Icon name="ArrowLeft" size={14} /> Retour à l'accueil
                                </button>
                                {view === 'legal' && (
                                    <>
                                        <h1 className="text-4xl font-serif text-[#004D40] mb-8">Mentions Légales</h1>
                                        <h2>Éditeur du site</h2>
                                        <p>Le site <strong>LeChoixDeClara.fr</strong> est édité par Marc ASSI, résidant en France.</p>
                                        <p>Contact : <a href="mailto:nova.iris.kael@gmail.com" className="text-[#6B0D0D] font-bold">nova.iris.kael@gmail.com</a></p>
                                        <h2>Hébergement</h2>
                                        <p>Le site est hébergé par <strong>Netlify Inc.</strong>, San Francisco, USA.</p>
                                    </>
                                )}
                                {view === 'privacy' && <h1 className="text-4xl font-serif text-[#004D40] mb-8">Politique de Confidentialité</h1>}
                                {view === 'affiliate' && <h1 className="text-4xl font-serif text-[#004D40] mb-8">Divulgation d'Affiliation</h1>}
                            </div>
                        )}

                        {view === 'admin' && user && user.uid === ADMIN_UID && (
                            <div className="max-w-6xl mx-auto px-6 py-12 text-left fade-in">
                                <div className="flex justify-between items-center mb-12 border-b pb-8">
                                    <h2 className="text-3xl font-serif text-[#004D40] font-bold">Atelier de Rédaction</h2>
                                    <button onClick={() => { setIsPreview(false); auth.signOut().then(()=>setView('home')); }} className="text-gray-400 hover:text-[#6B0D0D] flex items-center gap-2 font-bold transition">
                                        <Icon name="LogOut" size={18}/> Quitter
                                    </button>
                                </div>
                                
                                {isPreview ? (
                                    <div className="space-y-8">
                                        <div className="flex justify-between items-center bg-emerald text-white p-6 rounded-2xl shadow-lg sticky top-24 z-[60]">
                                            <div className="flex items-center gap-4">
                                                <div className="bg-white/20 p-2 rounded-lg"><Icon name="Eye" size={24} /></div>
                                                <div>
                                                    <p className="font-bold">Mode Prévisualisation</p>
                                                    <p className="text-xs opacity-75">Ceci est le rendu exact qu'auront vos visiteurs.</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-4">
                                                <button onClick={handleTogglePreview} className="bg-white/10 hover:bg-white/20 px-6 py-3 rounded-xl font-bold transition flex items-center gap-2">
                                                    <Icon name="Edit3" size={18} /> Modifier
                                                </button>
                                                <button onClick={handleAddArticle} className="bg-white text-emerald px-8 py-3 rounded-xl font-bold transition shadow-xl hover:scale-105 active:scale-95">
                                                    Publier maintenant
                                                </button>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-[3rem] shadow-sm border border-gray-100 overflow-hidden mb-10">
                                            <ArticleLayout article={previewData} onBack={handleTogglePreview} />
                                        </div>
                                    </div>
                                ) : (
                                    <div className="grid lg:grid-cols-2 gap-12 items-start">
                                        <div className="bg-white p-8 rounded-3xl shadow-lg border border-gray-100 text-left">
                                            <h3 className="font-bold mb-8 flex items-center gap-2 text-xl text-[#004D40]"><Icon name="Plus" /> Nouveau Test</h3>
                                            <form ref={formRef} onSubmit={handleAddArticle} className="space-y-6 text-left">
                                                <div className="grid grid-cols-2 gap-4 text-left">
                                                    <input name="title" defaultValue={previewData.title} placeholder="Nom du produit" className="p-4 border rounded-xl outline-none" required />
                                                    <select name="category" defaultValue={previewData.category} className="p-4 border rounded-xl outline-none">
                                                        <option>ACTIVEWEAR</option><option>LOUNGEWEAR</option><option>BEACHWEAR</option><option>GEEK</option><option>TECH</option>
                                                    </select>
                                                </div>
                                                <input name="excerpt" defaultValue={previewData.excerpt} placeholder="Hook accrocheur" className="w-full p-4 border rounded-xl outline-none" required />
                                                <div className="space-y-2 text-left">
                                                    <label className="text-xs font-bold uppercase text-gray-400 tracking-widest">Récit du test</label>
                                                    <div ref={quillRef} style={{height: '450px'}}></div>
                                                </div>
                                                <div className="space-y-2 text-left">
                                                    <label className="text-xs font-bold uppercase text-gray-400 tracking-widest">Image de couverture (Vignette)</label>
                                                    <input name="imageUrl" defaultValue={previewData.imageUrl} placeholder="URL (ex: mon-produit.webp)" className="w-full p-4 border rounded-xl outline-none bg-gray-50" required />
                                                </div>
                                                <input name="affiliateLink" defaultValue={previewData.affiliateLink} placeholder="Lien Amazon Affilié" className="w-full p-4 border rounded-xl outline-none" required />
                                                
                                                <div className="grid grid-cols-2 gap-4 pt-4">
                                                    <button type="button" onClick={handleTogglePreview} className="bg-emerald text-white py-5 rounded-2xl font-bold shadow-lg btn-hover uppercase tracking-widest flex items-center justify-center gap-2 transition">
                                                        <Icon name="Eye" size={18} /> Prévisualiser
                                                    </button>
                                                    <button className="bg-[#6B0D0D] text-white py-5 rounded-2xl font-bold shadow-lg btn-hover uppercase tracking-widest transition">
                                                        Publier
                                                    </button>
                                                </div>
                                            </form>
                                        </div>
                                        <div className="space-y-4">
                                            <h3 className="font-bold mb-8 text-[#004D40] flex justify-between items-center text-left">
                                                <span>Articles en ligne</span>
                                                <span className="bg-[#FDF5E6] text-[#004D40] px-3 py-1 rounded-full text-xs font-mono">{articles.length}</span>
                                            </h3>
                                            <div className="grid gap-4 max-h-[1100px] overflow-y-auto pr-2 no-scrollbar">
                                                {articles.map(art => (
                                                    <div key={art.id} className="bg-white p-6 rounded-2xl flex justify-between items-center border border-gray-100 hover:border-emerald/20 transition shadow-sm">
                                                        <div className="overflow-hidden mr-4 text-left">
                                                            <p className="font-bold text-sm truncate text-[#004D40]">{art.title}</p>
                                                            <p className="text-[10px] text-[#6B0D0D] font-bold uppercase mt-1">{art.category}</p>
                                                        </div>
                                                        <button onClick={() => setDeletingId(art.id)} className="text-gray-200 hover:text-red-500 p-3 transition-colors bg-gray-50 rounded-xl"><Icon name="Trash2" size={18} /></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="bg-[#1A1A1A] text-white py-20 px-6 border-t border-white/5 text-left mt-auto">
                        <div className="container mx-auto grid md:grid-cols-3 gap-16">
                            <div className="text-left">
                                <div className="text-3xl font-serif font-bold mb-8 cursor-default select-none text-white">
                                    LeCh<span onClick={handleAdminTrigger} className="cursor-default hover:text-[#6B0D0D] transition-colors duration-200">o</span>ixDeClara
                                </div>
                                <p className="text-gray-400 text-sm leading-relaxed max-w-xs italic text-left">Clara, 32 ans, 1m78. Une expertise athlétique pour guider l'homme moderne dans ses choix de cadeaux.</p>
                            </div>
                            <div className="text-gray-500 text-xs space-y-4 uppercase tracking-widest font-bold text-left">
                                <div onClick={() => {setView('legal'); window.scrollTo(0,0);}} className="hover:text-white transition cursor-pointer">Mentions Légales</div>
                                <div onClick={() => {setView('privacy'); window.scrollTo(0,0);}} className="hover:text-white transition cursor-pointer">Confidentialité</div>
                                <div onClick={() => {setView('affiliate'); window.scrollTo(0,0);}} className="hover:text-white transition cursor-pointer">Divulgation Affiliation</div>
                            </div>
                            <div className="text-gray-400 text-sm text-left">
                                <p className="font-bold text-white mb-4 uppercase tracking-widest text-xs">Contact</p>
                                <p className="italic text-gray-500 mb-8">nova.iris.kael@gmail.com</p>
                            </div>
                        </div>
                        <div className="container mx-auto mt-20 pt-8 border-t border-white/5 text-[10px] text-gray-700 font-mono text-center">© 2026 LECHOIXDECLARA.FR - TOUS DROITS RÉSERVÉS</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
